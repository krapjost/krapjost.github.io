<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no initial-scale=1">
    <title></title>
  </head>
  <body>
    <table>
      <form name = calc>
    <tr>
      <td colspan=5><input type=text size=10% name=display></td>
    <tr align="left" valign="middle">
      <td><input type = "button" name="seven" value = "7" onclick="addDisplay(7)"></td>
      <td><input type = "button" name = "eight" value = "8" onclick="addDisplay(8)"></td>
      <td><input type = "button" name = "nine" value = "9" onclick="addDisplay(9)"></td>
      <td><input type = "button" name = "devide" value = "/" onclick="cal_div()"></td>
    <tr allign="left" vallign="middle">
      <td><input type = "button" name = "four" value = "4" onclick="addDisplay(4)";/></td>
      <td><input type = "button" name = "five" value = "5" onclick="addDisplay(5)";/></td>
      <td><input type = "button" name = "six" value = "6" onclick="addDisplay(6)";/></td>
      <td><input type = "button" class = "set-size" name = "multiply" value = "*" onclick="cal_mul()";/></td>
    <tr allign="left" vallign="middle">
    <td><input type = "button" name = "one" value = "1" onclick="addDisplay(1)";/></td>
    <td><input type = "button" name = "two" value = "2" onclick="addDisplay(2)";/></td>
    <td><input type = "button" name = "three" value = "3" onclick="addDisplay(3)";/></td>
    <td><input type = "button" name = "sub" value = "-" onclick="cal_sub()";/></td>
    <tr allign="left" vallign="middle">
    <td><input type = "button" name = "dot" value = "." onclick="addDisplay(.)";/></td>
    <td><input type = "button" name = "zero" value = "0" onclick="addDisplay(0)";/></td>
    <td><input type = "button" name = "run" value = "=" onclick="calculate()";/></td>
    <td><input type = "button" name = "add" value = "+" onclick="cal_add()";/></td>
    <tr allign="left" vallign="middle">
      <td colspan=2><input type =button name=clear value="clear" onclick=clearDisplay()></td>

    <fieldset>
    <legend>html계산기</legend>
      <form oninput = "sumresult.value = parseInt(z1.value)+parseInt(z2.value)">
       더하기<input type = "number" name = "z1" value = "20" /> +
       <input type = "number" name = "z2" value = "40" />
       = <output name = "sumresult"></output>
      </form>
       <form oninput = "sumresult.value = parseInt(z1.value)-parseInt(z2.value)">
       빼애기<input type = "number" name = "z1" value = "20" /> - <input type = "number" name = "z2" value = "40" />
        = <output name = "sumresult"></output>
      </form>
       <form oninput = "sumresult.value = parseInt(z1.value)*parseInt(z2.value)">
       곱하기<input type = "number" name = "z1" value = "20" /> *
       <input type = "number" name = "z2" value = "40" />
       = <output name = "sumresult"></output>
     </form>
      <form oninput = "sumresult.value = parseInt(z1.value)/parseInt(z2.value)">
      나누기<input type = "number" name = "z1" value = "20" /> /
      <input type = "number" name = "z2" value = "40" />
      = <output name = "sumresult"></output>
     </form>
    </fieldset>
    <script src="cal.js" charset="utf-8">
    </script>
  </body>
</html>

<!DOCTYPE html>
<html>

<head>
  <title>timer</title>
  <link rel='stylesheet' href='./stylesheets/style.css' />
</head>

<body>
  <h1>Hello userId </h1>
  <header id="header">
    <h1>timer</h1>
    <div id="timewrap">
      <p id="timer">
         10:10:10
      </p>
    </div>
    <h1>COST</h1>
    <div id="costwrap">
      <p id="cost">
         10000 
      </p>
    </div>
  </header>

  <main id="main">

    <form action="" id="formwrap" method="">
      <div id="methodwrap">
        <input type="radio" name="method" value="card" id="card">
        <label for="card" class="label">card</label>

        <input type="radio" name="method" value="cash" id="cash">
        <label for="cash" class="label">cash</label>
      </div>
      <input type="text" id="tcost" maxlength="8" value=" cost " name="tcost" required>
      <input style="display: none;" type="text" id="user_id" maxlength="8" value=" id " name="user_id" required>
      <a href="./out.html"><button type="button" id="postbtn">PAY</button></a>
    </form>

  </main>
  <script src="./javascripts/timer.js"></script>
</body>

</html>

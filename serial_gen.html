
<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>시리얼 번호 만들기</title>
  </head>
  <body>
    <div class="subject">
      시리얼 번호 만들기
      시리얼 번호를 자동으로 생성해 주는 프로그램 개발
      상품명을 입력 받으면 앞 두글자와 번호로 시리얼 번호 생성
      'q' 를 입력할 때까지 프로그램이 종료하면 안됨!
      예) monitor 를 입력하면 MO0001을 출력
      graphic card를 입력하면 GR0001을 출력
      또 monitor를 입력하면 MO0002를 출력
    </div>
    <form oninput="result.value=parseInt(a.value2번째값)+">
      <input type="text" id="a" name="a_p" value="">
      <input type="number" id="b" name="b_n" value="">
      <input type="button" name="num_gen" value="">
    </form>
  </body>

</html>
